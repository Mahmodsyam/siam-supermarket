<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>سوبر ماركت صيام - تم تسجيل الخروج</title>
  <meta name="description" content="تم تسجيل الخروج من WiFi - سوبر ماركت صيام">
  <meta name="theme-color" content="#362E1E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-brand">
        <img src="images/logo.png" alt="سوبر ماركت صيام" class="header-logo">
        <span class="header-title">سوبر ماركت صيام</span>
      </div>
    </div>
  </header>

  <div class="hotspot-page">
    <div class="hotspot-body">
      <div class="hotspot-card glass-card">
        <div class="logout-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--green-medium)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h2 style="color:var(--green-dark)">تم تسجيل الخروج بنجاح</h2>
        <p>شكراً لاستخدام شبكة سوبر ماركت صيام<br>نتمنى لك يوماً سعيداً</p>
        <a href="$(link-login)" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          تسجيل الدخول مرة أخرى
        </a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-brand">&#9733; سوبر ماركت <span class="footer-gold">صيام</span></div>
      <p class="footer-text">للمواد الغذائية — الجودة والفخامة</p>
      <div class="footer-divider"></div>
      <p class="footer-copyright">&copy; سوبر ماركت صيام — جميع الحقوق محفوظة</p>
      <p class="footer-credit">مصمم الصفحة: م.محمود جهاد صيام — 0594371086</p>
    </div>
  </footer>
</body>
</html>
