<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>سوبر ماركت صيام - خطأ</title>
  <meta name="description" content="حدث خطأ في تسجيل الدخول - سوبر ماركت صيام">
  <meta name="theme-color" content="#1E3F20">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-brand">
        <img src="images/logo.png" alt="سوبر ماركت صيام" class="header-logo">
        <span class="header-title">سوبر ماركت صيام</span>
      </div>
    </div>
  </header>

  <div class="hotspot-page">
    <div class="hotspot-body">
      <div class="hotspot-card glass-card">
        <div class="logout-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2 style="color:#c0392b">حدث خطأ</h2>
        $(if error)
        <div class="error-alert">
          <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>$(error)</span>
        </div>
        $(endif)
        <a href="$(link-login)" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          العودة إلى صفحة تسجيل الدخول
        </a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-brand">&#9733; سوبر ماركت <span class="footer-gold">صيام</span></div>
      <p class="footer-text">للمواد الغذائية — الجودة والفخامة</p>
      <div class="footer-divider"></div>
      <p class="footer-copyright">&copy; سوبر ماركت صيام — جميع الحقوق محفوظة</p>
      <p class="footer-credit">مصمم الصفحة: م.محمود جهاد صيام — 0594371086</p>
    </div>
  </footer>
</body>
</html>
